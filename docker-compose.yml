version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    restart: always
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: portfolio_backend
    restart: always
    volumes:
      - ./backend/uploads:/app/uploads
      # Mount the sqlite database file to persist data
      - ./backend/portfolio.db:/app/portfolio.db
    env_file:
      - ./backend/.env
    ports:
      # Expose for backend-only direct testing if needed, though proxy routes it
      - "5000:5000"

  proxy:
    image: nginx:alpine
    container_name: portfolio_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
